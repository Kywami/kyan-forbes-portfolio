<script type="text/babel">
  function FadeInImages(props) {
    const [isVisible, setVisible] = React.useState(false);
    
    React.useEffect(() => {
      const timer = setTimeout(() => {
        setVisible(true);
      }, 100);
      return () => clearTimeout(timer);
    }, []);

const directionClass = props.direction || 'from-right';
    const customClass = props.className || '';
    const visibleClass = isVisible ? 'is-visible' : '';
      
    return (
      <div className={`fade-in-section ${directionClass} ${customClass} ${visibleClass}`.trim()}>
        {props.children}
      </div>
    );
  }

  const rootElement = document.getElementById('react-decorations-root');
  if (rootElement) {
    const root = ReactDOM.createRoot(rootElement);
   // --- FIX: Swap the directions and classes here so they match your CSS architecture ---
root.render(
  <React.Fragment>
   
    <FadeInImages direction="from-left" className="top-offset">
      <img src="https://img.pokemondb.net/sprites/diamond-pearl/shiny/squirtle.png" alt="Shiny Squirtle sprite" />
    </FadeInImages>
    
    <FadeInImages direction="from-right" className="bottom-offset">
      <img src="https://img.pokemondb.net/sprites/diamond-pearl/shiny/bulbasaur.png" alt="Shiny Bulbasaur sprite" />
    </FadeInImages>
  </React.Fragment>
);
  }
</script>
